name: UKCI

permissions:
  contents: read

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'
  push:
    branches:
      - main
      - ci
    paths: &trigger_paths
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'rustfmt.toml'
      - 'fixtures/**'
      - 'crates/**'
      - 'src/**'
      - '.github/workflows/nix.yml'
      - 'nix/**'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths: *trigger_paths
  merge_group:

# ensure that the workflow is only triggered once per PR,  subsequent pushes to the PR will cancel
# and restart the workflow. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bpf-verifier-changes:
    name: Detect kernel-space eBPF changes
    if: github.event_name == 'pull_request' && github.event.action != 'labeled' && github.event.action != 'unlabeled'
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- \
            ':(glob)crates/tracexec-backend-ebpf/src/**/*.bpf.c' \
            ':(glob)crates/tracexec-backend-ebpf/src/**/*.bpf.h' \
            ':(glob)crates/tracexec-backend-ebpf/src/**/*.h' \
            'crates/tracexec-backend-ebpf/include/vmlinux.h' \
            ':(glob)crates/tracexec-backend-ebpf/include/x86/**/*.h'
          diff_status=$?
          set -e

          case "$diff_status" in
            0) echo "changed=false" >> "$GITHUB_OUTPUT" ;;
            1) echo "changed=true" >> "$GITHUB_OUTPUT" ;;
            *) exit "$diff_status" ;;
          esac

  nix:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - &install-nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            keep-env-derivations = true
            keep-outputs = true
            http2 = false

      - &attic-writable
        name: Setup Attic cache (Writable)
        uses: ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a # v0.5.0
        if: github.event.pull_request.head.repo.fork != true
        with:
          endpoint: https://nix.kxxt.dev
          cache: tracexec
          token: ${{ secrets.NIX_CACHE_JWT }}

      - &attic-rdonly
        name: Setup Attic cache (ReadOnly)
        uses: ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a # v0.5.0
        if: github.event.pull_request.head.repo.fork == true
        with:
          endpoint: https://nix.kxxt.dev
          cache: tracexec
          skip-push: true

      - name: Select UKCI package
        env:
          FULL_UKCI: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci')) }}
        run: |
          if [ "$FULL_UKCI" = "true" ]; then
            echo "UKCI_PACKAGE=ukci" >> "$GITHUB_ENV"
          else
            echo "UKCI_PACKAGE=ukci-latest-llvm" >> "$GITHUB_ENV"
          fi

      # Run Userspace<->Kernel CI
      - name: Run UKCI
        env:
          UKCI_SUMMARY_TITLE: UKCI (${{ matrix.os }})
        run: nix run ".#$UKCI_PACKAGE"
      - name: Add gc root for UKCI
        run: sudo ln -s "$(nix eval --raw ".#$UKCI_PACKAGE")" /nix/var/nix/gcroots/ukci

  nix-cross:
    strategy:
      matrix:
        arch: [riscv64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - *install-nix

      - *attic-writable

      - *attic-rdonly

      - name: Select UKCI package
        env:
          FULL_UKCI: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci')) }}
        run: |
          if [ "$FULL_UKCI" = "true" ]; then
            echo "UKCI_PACKAGE=ukci-${{ matrix.arch }}" >> "$GITHUB_ENV"
          else
            echo "UKCI_PACKAGE=ukci-${{ matrix.arch }}-latest-llvm" >> "$GITHUB_ENV"
          fi

      # Run Userspace<->Kernel CI
      - name: Run UKCI
        env:
          UKCI_SUMMARY_TITLE: UKCI (cross ${{ matrix.arch }})
        run: nix run ".#$UKCI_PACKAGE"
      - name: Add gc root for UKCI
        run: sudo ln -s "$(nix eval --raw ".#$UKCI_PACKAGE")" /nix/var/nix/gcroots/ukci

  bpf-verifier-complexity:
    name: eBPF verifier complexity (x86_64)
    needs: bpf-verifier-changes
    if: needs.bpf-verifier-changes.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - *install-nix

      - *attic-writable

      - *attic-rdonly

      - name: Collect verifier complexity
        id: collect
        env:
          UKCI_COMPLEXITY_OUT_DIR: verifier-complexity
          UKCI_MAX_PARALLEL: 2
          UKCI_SUMMARY_TITLE: eBPF verifier complexity (x86_64)
        run: nix run .#ukci-complexity-x86_64

      - name: Render verifier complexity plots
        id: plot
        if: always() && hashFiles('verifier-complexity/*.json') != ''
        run: nix run .#plot-verifier-complexity -- verifier-complexity --log-scale

      - name: Upload raw verifier data
        id: raw-artifact
        if: always() && hashFiles('verifier-complexity/*.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: bpf-verifier-complexity-raw
          path: verifier-complexity/*.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload verifier plots and summary
        id: plots-artifact
        if: always() && hashFiles('verifier-complexity-plots/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: bpf-verifier-complexity-plots
          path: verifier-complexity-plots/
          if-no-files-found: error
          retention-days: 30

      - name: Prepare report metadata
        if: always()
        env:
          COLLECT_OUTCOME: ${{ steps.collect.outcome }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PLOT_OUTCOME: ${{ steps.plot.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p verifier-complexity-report
          jq -n \
            --argjson pr_number "$PR_NUMBER" \
            --arg head_sha "$HEAD_SHA" \
            --arg collect_outcome "$COLLECT_OUTCOME" \
            --arg plot_outcome "$PLOT_OUTCOME" \
            '{
              pr_number: $pr_number,
              head_sha: $head_sha,
              collect_outcome: $collect_outcome,
              plot_outcome: $plot_outcome
            }' > verifier-complexity-report/metadata.json

      - name: Upload report metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bpf-verifier-complexity-report
          path: verifier-complexity-report/metadata.json
          if-no-files-found: error
          retention-days: 7
