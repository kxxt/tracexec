name: UKCI

permissions:
  contents: read

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - main
      - ci
    paths: &trigger_paths
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'rustfmt.toml'
      - 'fixtures/**'
      - 'crates/**'
      - 'src/**'
      - '.github/workflows/nix.yml'
      - 'nix/**'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths: *trigger_paths
  merge_group:

# ensure that the workflow is only triggered once per PR,  subsequent pushes to the PR will cancel
# and restart the workflow. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  nix:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - &install-nix
        uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
            http2 = false
          
      - &attic-writable
        name: Setup Attic cache (Writable)
        uses: ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a # v0.5.0
        if: github.event.pull_request.head.repo.fork != true
        with:
          endpoint: https://nix.kxxt.dev
          cache: tracexec
          token: ${{ secrets.NIX_CACHE_JWT }}
      
      - &attic-rdonly
        name: Setup Attic cache (ReadOnly)
        uses: ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a # v0.5.0
        if: github.event.pull_request.head.repo.fork == true
        with:
          endpoint: https://nix.kxxt.dev
          cache: tracexec
          skip-push: true

      # Run Userspace<->Kernel CI
      - name: Run UKCI
        env:
          UKCI_SUMMARY_TITLE: UKCI (${{ matrix.os }})
        run: nix run '.#ukci'
      - name: Add gc root for UKCI
        run: ln -s "$(nix eval --raw '.#ukci')" /nix/var/nix/gcroots/ukci

  nix-cross:
    strategy:
      matrix:
        arch: [riscv64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - *install-nix
          
      - *attic-writable
      
      - *attic-rdonly

      # Run Userspace<->Kernel CI
      - name: Run UKCI
        env:
          UKCI_SUMMARY_TITLE: UKCI (cross ${{ matrix.arch }})
        run: nix run '.#ukci-${{ matrix.arch }}'
      - name: Add gc root for UKCI
        run: ln -s "$(nix eval --raw '.#ukci-${{ matrix.arch }}')" /nix/var/nix/gcroots/ukci
