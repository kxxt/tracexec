name: Nix verifier complexity report

on:
  workflow_run:
    workflows: [Nix verifier complexity]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment:
    name: Update verifier complexity PR comment
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Download results and update comment
        env:
          GH_TOKEN: ${{ github.token }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          REPOSITORY: ${{ github.repository }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          artifacts_json="$(gh api "/repos/$REPOSITORY/actions/runs/$RUN_ID/artifacts?per_page=100")"
          metadata_id="$(jq -r \
            '[.artifacts[] | select(.name == "bpf-verifier-complexity-report")][0].id // empty' \
            <<< "$artifacts_json")"

          # A missing metadata artifact means the complexity job was skipped.
          if [ -z "$metadata_id" ]; then
            echo "No verifier complexity report artifact; nothing to comment on."
            exit 0
          fi

          metadata_size="$(jq -r \
            --argjson id "$metadata_id" \
            '.artifacts[] | select(.id == $id) | .size_in_bytes' \
            <<< "$artifacts_json")"
          if [ -z "$metadata_size" ] || [ "$metadata_size" -gt 65536 ]; then
            echo "Verifier report metadata is unexpectedly large." >&2
            exit 1
          fi

          mkdir -p downloaded-metadata
          gh api "/repos/$REPOSITORY/actions/artifacts/$metadata_id/zip" > metadata.zip
          unzip -q metadata.zip -d downloaded-metadata
          metadata=downloaded-metadata/metadata.json
          jq -e '
            (.pr_number | type == "number" and . > 0) and
            (.head_sha | type == "string" and test("^[0-9a-f]{40}$")) and
            (.collect_outcome | IN("success", "failure", "cancelled", "skipped")) and
            (.plot_outcome | IN("success", "failure", "cancelled", "skipped"))
          ' "$metadata" >/dev/null

          pr_number="$(jq -r '.pr_number' "$metadata")"
          head_sha="$(jq -r '.head_sha' "$metadata")"
          collect_outcome="$(jq -r '.collect_outcome' "$metadata")"
          plot_outcome="$(jq -r '.plot_outcome' "$metadata")"

          if [ "$head_sha" != "$RUN_HEAD_SHA" ]; then
            echo "Report SHA does not match its workflow run." >&2
            exit 1
          fi

          pr_json="$(gh api "/repos/$REPOSITORY/pulls/$pr_number")"
          current_head_sha="$(jq -r '.head.sha' <<< "$pr_json")"
          base_repository="$(jq -r '.base.repo.full_name' <<< "$pr_json")"
          if [ "$base_repository" != "$REPOSITORY" ]; then
            echo "Report points to a pull request in another repository." >&2
            exit 1
          fi
          if [ "$current_head_sha" != "$head_sha" ]; then
            echo "Pull request advanced past this run; skipping stale report."
            exit 0
          fi

          raw_id="$(jq -r \
            '[.artifacts[] | select(.name == "bpf-verifier-complexity-raw")][0].id // empty' \
            <<< "$artifacts_json")"
          plots_id="$(jq -r \
            '[.artifacts[] | select(.name == "bpf-verifier-complexity-plots")][0].id // empty' \
            <<< "$artifacts_json")"
          run_url="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
          raw_url=""
          plots_url=""
          if [ -n "$raw_id" ]; then
            raw_url="$run_url/artifacts/$raw_id"
          fi
          if [ -n "$plots_id" ]; then
            plots_url="$run_url/artifacts/$plots_id"
          fi

          records=0
          builds=0
          metrics_json='[]'
          if [ -n "$raw_id" ]; then
            raw_size="$(jq -r \
              --argjson id "$raw_id" \
              '.artifacts[] | select(.id == $id) | .size_in_bytes' \
              <<< "$artifacts_json")"
            if [ -z "$raw_size" ] || [ "$raw_size" -gt 52428800 ]; then
              echo "Raw verifier artifact is unexpectedly large." >&2
              exit 1
            fi

            mkdir -p downloaded-raw
            gh api "/repos/$REPOSITORY/actions/artifacts/$raw_id/zip" > raw.zip
            unzip -q raw.zip -d downloaded-raw
            mapfile -d '' json_files < <(find downloaded-raw -type f -name '*.json' -print0)
            if [ "${#json_files[@]}" -gt 0 ]; then
              jq -s '
                def clean:
                  tostring
                  | gsub("[^A-Za-z0-9_.+:/-]"; "_")
                  | .[:100];
                def top($field; $label):
                  ([.[] | select(.[$field] | type == "number")] | max_by(.[$field])) as $row
                  | if $row == null then empty else {
                      label: $label,
                      value: $row[$field],
                      build: ($row.build // "unknown" | clean),
                      load_program: (
                        (($row.load // "unknown") | clean) + "/" +
                        (($row.program // "unknown") | clean)
                      )
                    } end;
                [ .[] | if type == "array" then . else (.records // []) end ]
                | add
                | map(select(.arch == "x86_64"))
                | {
                    records: length,
                    builds: (map(.build // "unknown") | unique | length),
                    metrics: [
                      top("insns_processed"; "Instructions processed"),
                      top("verification_time_microseconds"; "Verification time (µs)"),
                      top("peak_states"; "Peak states"),
                      top("stack_depth"; "Stack depth")
                    ]
                  }
              ' "${json_files[@]}" > result-summary.json
              records="$(jq -r '.records' result-summary.json)"
              builds="$(jq -r '.builds' result-summary.json)"
              metrics_json="$(jq -c '.metrics' result-summary.json)"
            fi
          fi

          plot_links_json='[]'
          if [ -n "$plots_id" ]; then
            plots_size="$(jq -r \
              --argjson id "$plots_id" \
              '.artifacts[] | select(.id == $id) | .size_in_bytes' \
              <<< "$artifacts_json")"
            if [ -z "$plots_size" ] || [ "$plots_size" -gt 104857600 ]; then
              echo "Verifier plots artifact is unexpectedly large." >&2
              exit 1
            fi

            mkdir -p downloaded-plots
            gh api "/repos/$REPOSITORY/actions/artifacts/$plots_id/zip" > plots.zip
            unzip -q plots.zip -d downloaded-plots
            mapfile -d '' plot_files < <(
              find downloaded-plots -type f -name '*.png' -print0 | sort -z
            )
            if [ "${#plot_files[@]}" -gt 16 ]; then
              echo "Verifier plots artifact contains too many PNG files." >&2
              exit 1
            fi

            if [ "${#plot_files[@]}" -gt 0 ]; then
              if [ -z "$IMGBB_API_KEY" ]; then
                echo "The IMGBB_API_KEY repository secret is not configured." >&2
                exit 1
              fi

              declare -A seen_plot_names=()
              for plot_file in "${plot_files[@]}"; do
                plot_name="$(basename "$plot_file")"
                if [[ ! "$plot_name" =~ ^[a-z0-9][a-z0-9.-]*\.png$ ]]; then
                  echo "Invalid verifier plot filename: $plot_name" >&2
                  exit 1
                fi
                if [ -n "${seen_plot_names[$plot_name]+x}" ]; then
                  echo "Duplicate verifier plot filename: $plot_name" >&2
                  exit 1
                fi
                seen_plot_names[$plot_name]=1

                plot_size="$(stat -c '%s' "$plot_file")"
                if [ "$plot_size" -eq 0 ] || [ "$plot_size" -gt 10485760 ]; then
                  echo "Invalid verifier plot size for $plot_name: $plot_size" >&2
                  exit 1
                fi
                signature="$(od -An -tx1 -N8 "$plot_file" | tr -d ' \n')"
                if [ "$signature" != 89504e470d0a1a0a ]; then
                  echo "Verifier plot is not a PNG: $plot_name" >&2
                  exit 1
                fi

                image_name="tracexec-pr-$pr_number-${head_sha:0:12}-${plot_name%.png}"
                upload_response="$(curl \
                  --fail-with-body \
                  --silent \
                  --show-error \
                  --request POST \
                  --form-string "key=$IMGBB_API_KEY" \
                  --form-string "name=$image_name" \
                  --form "image=@$plot_file;type=image/png" \
                  https://api.imgbb.com/1/upload)"
                if ! jq -e '
                  .success == true and
                  .status == 200 and
                  (.data.url | type == "string" and startswith("https://i.ibb.co/"))
                ' <<< "$upload_response" >/dev/null; then
                  echo "ImgBB returned an invalid response for $plot_name." >&2
                  exit 1
                fi
                upload_url="$(jq -r '.data.url' <<< "$upload_response")"
                plot_links_json="$(jq -c \
                  --arg name "$plot_name" \
                  --arg url "$upload_url" \
                  '. + [{name: $name, url: $url}]' \
                  <<< "$plot_links_json")"
              done
            fi
          fi

          if [ "$collect_outcome" = success ] && [ "$plot_outcome" = success ]; then
            status_icon="✅"
            status_text="Collection and plotting succeeded"
          elif [ "$collect_outcome" = success ]; then
            status_icon="⚠️"
            status_text="Collection succeeded, but plotting did not"
          else
            status_icon="❌"
            status_text="Collection did not complete successfully"
          fi

          marker='<!-- tracexec-bpf-verifier-complexity -->'
          {
            echo "$marker"
            echo "## eBPF verifier complexity · x86_64"
            echo
            echo "$status_icon **$status_text.** $records records across $builds kernel/Clang builds."
            echo
            echo '<details>'
            echo '<summary><strong>Result maxima</strong></summary>'
            echo
            if [ "$(jq 'length' <<< "$metrics_json")" -gt 0 ]; then
              echo '| Metric | Maximum | Build | Load/program |'
              echo '| --- | ---: | --- | --- |'
              jq -r '.[] | "| \(.label) | \(.value) | `\(.build)` | `\(.load_program)` |"' \
                <<< "$metrics_json"
            else
              echo 'No valid x86_64 verifier records were produced.'
            fi
            echo
            echo '</details>'
            echo
            echo '<details>'
            echo '<summary><strong>Plots</strong></summary>'
            echo
            if [ "$(jq 'length' <<< "$plot_links_json")" -gt 0 ]; then
              while IFS=$'\t' read -r plot_name plot_url; do
                plot_title="${plot_name%.png}"
                plot_title="${plot_title//-/ }"
                echo "#### $plot_title"
                echo
                echo "![$plot_title]($plot_url)"
                echo
              done < <(jq -r '.[] | [.name, .url] | @tsv' <<< "$plot_links_json")
            else
              echo 'No plots were produced.'
              echo
            fi
            if [ -n "$plots_url" ]; then
              echo "[Download the heatmaps, per-build charts, CSV, and Markdown summary]($plots_url)."
            fi
            echo
            echo '</details>'
            echo
            echo '<details>'
            echo '<summary><strong>Raw data and run details</strong></summary>'
            echo
            if [ -n "$raw_url" ]; then
              echo "- [Download raw verifier JSON (Actions artifact)]($raw_url)"
            else
              echo '- Raw verifier JSON was not produced.'
            fi
            echo "- [View the workflow run]($run_url)"
            echo "- Collector: \`$collect_outcome\`; plotter: \`$plot_outcome\`"
            echo
            echo '</details>'
          } > comment.md

          jq -n --rawfile body comment.md '{body: $body}' > comment-request.json
          comment_ids="$(gh api --paginate \
            "/repos/$REPOSITORY/issues/$pr_number/comments?per_page=100" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | startswith("<!-- tracexec-bpf-verifier-complexity -->")) | .id')"
          comment_id="${comment_ids%%$'\n'*}"
          if [ -n "$comment_id" ]; then
            gh api --method PATCH \
              "/repos/$REPOSITORY/issues/comments/$comment_id" \
              --input comment-request.json >/dev/null
          else
            gh api --method POST \
              "/repos/$REPOSITORY/issues/$pr_number/comments" \
              --input comment-request.json >/dev/null
          fi
